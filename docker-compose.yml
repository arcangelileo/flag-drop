services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flagdrop
    restart: unless-stopped
    ports:
      - "${FLAGDROP_PORT:-8000}:8000"
    volumes:
      - flagdrop-data:/app/data
    environment:
      - FLAGDROP_SECRET_KEY=${FLAGDROP_SECRET_KEY:?Set FLAGDROP_SECRET_KEY in .env or environment}
      - FLAGDROP_DATABASE_URL=sqlite+aiosqlite:///./data/flagdrop.db
      - FLAGDROP_HOST=0.0.0.0
      - FLAGDROP_PORT=8000
      - FLAGDROP_DEBUG=${FLAGDROP_DEBUG:-false}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  flagdrop-data:
    driver: local
